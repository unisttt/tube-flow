<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tube Flow</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <h1>Tube Flow</h1>
      <form id="popup-form">
        <label class="toggle" for="enabled">
          <input type="checkbox" id="enabled" name="enabled" />
          <span>Tube Flow を有効にする</span>
        </label>

        <label class="toggle" for="hideShorts">
          <input type="checkbox" id="hideShorts" name="hideShorts" />
          <span>Shorts を非表示にする</span>
        </label>

        <label class="field" for="visibleCount">
          <span class="label">表示カード数</span>
          <span class="controls">
            <button type="button" class="step" data-target="visibleCount" data-step="-1" aria-label="表示カード数を減らす">-</button>
            <input type="number" id="visibleCount" name="visibleCount" min="0" max="6" />
            <button type="button" class="step" data-target="visibleCount" data-step="1" aria-label="表示カード数を増やす">+</button>
          </span>
        </label>

        <label class="field" for="cardWidth">
          <span class="label">カードの幅(px)</span>
          <span class="controls">
            <button type="button" class="step" data-target="cardWidth" data-step="-20" aria-label="カードの幅を狭くする">-</button>
            <input type="number" id="cardWidth" name="cardWidth" min="360" max="1280" step="20" />
            <button type="button" class="step" data-target="cardWidth" data-step="20" aria-label="カードの幅を広くする">+</button>
          </span>
        </label>

        <label class="field" for="watchVisibleCount">
          <span class="label">おすすめ表示数</span>
          <span class="controls">
            <button type="button" class="step" data-target="watchVisibleCount" data-step="-1" aria-label="おすすめ表示数を減らす">-</button>
            <input type="number" id="watchVisibleCount" name="watchVisibleCount" min="0" max="20" />
            <button type="button" class="step" data-target="watchVisibleCount" data-step="1" aria-label="おすすめ表示数を増やす">+</button>
          </span>
        </label>

        <label class="toggle" for="durationFilterEnabled">
          <input type="checkbox" id="durationFilterEnabled" name="durationFilterEnabled" />
          <span>再生時間でフィルタ</span>
        </label>

        <label class="field" for="durationMinMinutes">
          <span class="label">最短（分・0で無し）</span>
          <span class="controls">
            <button type="button" class="step" data-target="durationMinMinutes" data-step="-5" aria-label="最短を減らす">-</button>
            <input type="number" id="durationMinMinutes" name="durationMinMinutes" min="0" max="600" step="5" />
            <button type="button" class="step" data-target="durationMinMinutes" data-step="5" aria-label="最短を増やす">+</button>
          </span>
        </label>

        <label class="field" for="durationMaxMinutes">
          <span class="label">最長（分・0で無し）</span>
          <span class="controls">
            <button type="button" class="step" data-target="durationMaxMinutes" data-step="-5" aria-label="最長を減らす">-</button>
            <input type="number" id="durationMaxMinutes" name="durationMaxMinutes" min="0" max="600" step="5" />
            <button type="button" class="step" data-target="durationMaxMinutes" data-step="5" aria-label="最長を増やす">+</button>
          </span>
        </label>

        <label class="toggle" for="hideSkippedEnabled">
          <input type="checkbox" id="hideSkippedEnabled" name="hideSkippedEnabled" />
          <span>スキップした動画を隠す</span>
        </label>

        <button type="button" class="secondary" id="reset-skipped">スキップ済みを表示に戻す</button>

        <hr class="sep" />

        <label class="toggle" for="scheduleBlockEnabled">
          <input type="checkbox" id="scheduleBlockEnabled" name="scheduleBlockEnabled" />
          <span>時間帯ブロック</span>
        </label>

        <label class="toggle" for="dailyLimitEnabled">
          <input type="checkbox" id="dailyLimitEnabled" name="dailyLimitEnabled" />
          <span>1 日の視聴時間上限</span>
        </label>

        <div id="usage" class="usage" aria-live="polite"></div>

        <div class="foot">
          <div id="status" aria-live="polite" role="status"></div>
          <button type="button" class="secondary" id="open-options">詳細設定</button>
          <button type="button" id="restore-defaults">既定値</button>
        </div>
      </form>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
