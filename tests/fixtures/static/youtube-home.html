<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>YouTube Home Fixture</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
        background: #181818;
        color: #fff;
      }
      ytd-rich-item-renderer {
        display: block;
        padding: 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      ytd-rich-item-renderer[data-visible="true"] {
        background: rgba(255, 255, 255, 0.06);
      }
      button {
        padding: 6px 10px;
      }
      ytd-reel-shelf-renderer,
      ytd-rich-shelf-renderer[is-shorts],
      ytd-rich-shelf-renderer[modernized-shelf-title*="Shorts"] {
        display: block;
        margin: 12px;
        padding: 12px;
        background: rgba(255, 0, 0, 0.2);
      }
    </style>
    <script>
      window.addEventListener('click', (event) => {
        const target = event.target;
        if (!target) {
          return;
        }
        if (target.matches('.watch-later')) {
          target.dataset.clicked = 'true';
        }
        if (target.matches('.not-interested')) {
          target.dataset.clicked = 'true';
        }
      });
    </script>
  </head>
  <body data-fixture="youtube-home">
    <h1 data-testid="title">Tube Flow Fixture</h1>
    <ytd-reel-shelf-renderer data-testid="shorts">Shorts Shelf</ytd-reel-shelf-renderer>
    <ytd-rich-grid-renderer>
      <div id="contents">
        <ytd-rich-item-renderer data-index="0">
          <yt-lockup-view-model class="lockup" data-lockup-index="0">
            <article>
              <h2>Video 0</h2>
              <p>First video</p>
              <div class="actions">
                <button class="watch-later" aria-label="後で見る">後で見る</button>
                <button class="not-interested" aria-label="興味なし">興味なし</button>
              </div>
            </article>
          </yt-lockup-view-model>
        </ytd-rich-item-renderer>
        <ytd-rich-item-renderer data-index="1">
          <yt-lockup-view-model class="lockup" data-lockup-index="1">
            <article>
              <h2>Video 1</h2>
              <p>Second video</p>
              <div class="actions">
                <button class="watch-later" aria-label="Watch later">Watch later</button>
                <button class="not-interested" aria-label="Not interested">Not interested</button>
              </div>
            </article>
          </yt-lockup-view-model>
        </ytd-rich-item-renderer>
        <yt-lockup-view-model data-index="2">
          <article>
            <h2>Lockup 2</h2>
            <p>Polymerless item 2</p>
            <div class="actions">
              <button class="watch-later" aria-label="Watch later">Watch later</button>
              <button class="not-interested" aria-label="Not interested">Not interested</button>
            </div>
          </article>
        </yt-lockup-view-model>
        <ytd-rich-item-renderer data-index="3">
          <article>
            <h2>Video 3</h2>
            <p>Fourth video</p>
            <div class="actions">
              <button class="watch-later" aria-label="後で見る">後で見る</button>
              <button class="not-interested" aria-label="興味なし">興味なし</button>
            </div>
          </article>
        </ytd-rich-item-renderer>
        <ytd-rich-item-renderer data-index="4">
          <article>
            <h2>Video 4</h2>
            <p>Fifth video</p>
            <div class="actions">
              <button class="watch-later" aria-label="後で見る">後で見る</button>
              <button class="not-interested" aria-label="興味なし">興味なし</button>
            </div>
          </article>
        </ytd-rich-item-renderer>
        <yt-lockup-view-model data-index="5">
          <article>
            <h2>Lockup 5</h2>
            <p>Polymerless item 5</p>
            <div class="actions">
              <button class="watch-later" aria-label="Watch later">Watch later</button>
              <button class="not-interested" aria-label="Not interested">Not interested</button>
            </div>
          </article>
        </yt-lockup-view-model>
        <yt-lockup-view-model data-index="6">
          <article>
            <h2>Lockup 6</h2>
            <p>Polymerless item 6</p>
            <div class="actions">
              <button class="watch-later" aria-label="後で見る">後で見る</button>
              <button class="not-interested" aria-label="興味なし">興味なし</button>
            </div>
          </article>
        </yt-lockup-view-model>
        <yt-lockup-view-model data-index="7">
          <article>
            <h2>Lockup 7</h2>
            <p>Polymerless item 7</p>
            <div class="actions">
              <button class="watch-later" aria-label="Watch later">Watch later</button>
              <button class="not-interested" aria-label="Not interested">Not interested</button>
            </div>
          </article>
        </yt-lockup-view-model>
      </div>
    </ytd-rich-grid-renderer>
  </body>
</html>
