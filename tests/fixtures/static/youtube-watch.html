<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>YouTube Watch Mock</title>
    <style>
      body {
        margin: 0;
        font-family: sans-serif;
      }
      ytd-watch-flexy {
        display: grid;
        grid-template-columns: 2fr 1fr;
        min-height: 100vh;
      }
      #primary {
        padding: 24px;
      }
      #secondary {
        padding: 24px;
        border-left: 1px solid #ddd;
        min-height: 100%;
      }
      #items > * {
        display: block;
        margin-bottom: 12px;
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 12px;
      }
      [data-role="title"] {
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <ytd-app>
      <ytd-watch-flexy>
        <div id="primary">
          <main>
            <h1 id="video-title">テスト動画</h1>
            <p>ここは動画のプレーヤー領域を模したダミーです。</p>
          </main>
          <div id="player">
            <div class="ytp-endscreen-content" id="endscreen-mock">
              <p>再生終了後に表示されるおすすめ</p>
            </div>
          </div>
        </div>
        <div id="secondary">
          <div id="related">
            <ytd-watch-next-secondary-results-renderer>
              <div id="items">
                <yt-lockup-view-model id="auto-item" class="lockup">
                  <div class="yt-lockup-view-model yt-lockup-view-model--horizontal yt-lockup-view-model--compact">
                    <span data-role="title">自動再生コンテンツ</span>
                  </div>
                </yt-lockup-view-model>
                <ytd-reel-shelf-renderer id="shorts-shelf">
                  <div class="style-scope ytd-reel-shelf-renderer">
                    <span data-role="title">Shorts セクション</span>
                  </div>
                </ytd-reel-shelf-renderer>
                <yt-lockup-view-model id="item-1" class="lockup">
                  <div class="yt-lockup-view-model yt-lockup-view-model--horizontal yt-lockup-view-model--compact">
                    <span data-role="title">おすすめ 1</span>
                  </div>
                </yt-lockup-view-model>
                <yt-lockup-view-model id="item-2" class="lockup">
                  <div class="yt-lockup-view-model yt-lockup-view-model--horizontal yt-lockup-view-model--compact">
                    <span data-role="title">おすすめ 2</span>
                  </div>
                </yt-lockup-view-model>
                <yt-lockup-view-model id="item-3" class="lockup">
                  <div class="yt-lockup-view-model yt-lockup-view-model--horizontal yt-lockup-view-model--compact">
                    <span data-role="title">おすすめ 3</span>
                  </div>
                </yt-lockup-view-model>
                <yt-lockup-view-model id="item-4" class="lockup">
                  <div class="yt-lockup-view-model yt-lockup-view-model--horizontal yt-lockup-view-model--compact">
                    <span data-role="title">おすすめ 4</span>
                  </div>
                </yt-lockup-view-model>
              </div>
            </ytd-watch-next-secondary-results-renderer>
          </div>
        </div>
      </ytd-watch-flexy>
    </ytd-app>
  </body>
</html>
